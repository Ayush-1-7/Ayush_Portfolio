<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#0d0d0d"/>
  
  <!-- Central Node -->
  <circle cx="50" cy="50" r="8" fill="#AAFF45"/>
  <circle cx="50" cy="50" r="12" fill="none" stroke="#AAFF45" 
          stroke-width="1" opacity="0.3"/>
  
  <!-- Connecting Lines -->
  <line x1="50" y1="50" x2="25" y2="25" stroke="#4F8EF7" 
        stroke-width="1.5" opacity="0.5"/>
  <line x1="50" y1="50" x2="75" y2="25" stroke="#4F8EF7" 
        stroke-width="1.5" opacity="0.5"/>
  <line x1="50" y1="50" x2="75" y2="75" stroke="#4F8EF7" 
        stroke-width="1.5" opacity="0.5"/>
  <line x1="50" y1="50" x2="25" y2="75" stroke="#4F8EF7" 
        stroke-width="1.5" opacity="0.5"/>
  
  <!-- Outer Nodes -->
  <circle cx="25" cy="25" r="4" fill="#4F8EF7"/>
  <circle cx="75" cy="25" r="4" fill="#4F8EF7"/>
  <circle cx="75" cy="75" r="4" fill="#4F8EF7"/>
  <circle cx="25" cy="75" r="4" fill="#4F8EF7"/>
</svg>
